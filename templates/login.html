{% extends "base.html" %}
{% block title %} — Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white tracking-tight">Ruci</h1>
      <p class="text-slate-400 mt-2">LLM API gateway</p>
    </div>
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
      {% if error %}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg px-4 py-3 text-sm mb-5">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" name="password" required autofocus
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
